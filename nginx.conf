server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Clean URLs: /privacy serves /privacy/index.html
  location / {
    try_files $uri $uri/ =404;
  }

  # Serve JSX (loaded via Babel standalone) with a JS content-type
  location ~ \.jsx$ {
    default_type application/javascript;
    add_header Cache-Control "public, max-age=300";
  }

  # Cache static images
  location ~* \.(png|jpg|jpeg|svg|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public";
  }

  location = /health {
    default_type text/plain;
    return 200 "ok";
  }
}
