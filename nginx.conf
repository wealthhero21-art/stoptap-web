server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Clean URLs: /privacy serves /privacy/index.html
  location / {
    try_files $uri $uri/ =404;
  }

  # Cache static images
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public";
  }

  location = /health {
    default_type text/plain;
    return 200 "ok";
  }
}
