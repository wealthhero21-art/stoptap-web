  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:     '#0A0E1F',
            ink2:    '#5A5F6E',
            bg:      '#FAFAF7',
            line:    '#E8E6DF',
            brand:   '#242D7A',
            brand2:  '#1B2360',
            orange:  '#EF7102',
            orange2: '#D45F00',
            green:   '#018136',
          },
          fontFamily: {
            sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
          },
          boxShadow: {
            card:  '0 1px 2px rgba(10,14,31,.04), 0 6px 24px -8px rgba(10,14,31,.08)',
            cardL: '0 1px 2px rgba(10,14,31,.04), 0 24px 60px -20px rgba(36,45,122,.22)',
            cta:   '0 1px 0 rgba(255,255,255,.25) inset, 0 8px 24px -6px rgba(239,113,2,.55)',
          },
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      background: #FAFAF7;
      color: #0A0E1F;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      font-feature-settings: "ss01", "cv11";
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    /* Leave room for sticky mobile CTA */
    @media (max-width: 768px) {
      body { padding-bottom: 88px; }
    }
    .tnum { font-variant-numeric: tabular-nums; }
    .reveal { opacity: 0; transform: translateY(14px); transition: opacity .55s ease-out, transform .55s ease-out; }
    .reveal.in { opacity: 1; transform: none; }
    .btn-press { transition: transform .15s ease-out, box-shadow .2s ease-out; }
    .btn-press:active { transform: scale(.97); }
    .ring-focus:focus-visible { outline: 2px solid #EF7102; outline-offset: 2px; }

    /* Subtle grain on the off-white bg */
    .grain::before{
      content:""; position:absolute; inset:0; pointer-events:none; opacity:.5; mix-blend-mode:multiply;
      background-image: radial-gradient(rgba(10,14,31,.025) 1px, transparent 1px);
      background-size: 3px 3px;
    }

    /* Hero phone slide animations */
    @keyframes slideOutRight {
      0% { transform: translateX(0); opacity: 1; max-height: 76px; margin-bottom: 8px; }
      40% { transform: translateX(120%); opacity: 0; max-height: 76px; margin-bottom: 8px; }
      100% { transform: translateX(120%); opacity: 0; max-height: 0; margin-bottom: 0; padding-top:0; padding-bottom:0; }
    }
    @keyframes slideInBottom {
      0% { transform: translateY(20px); opacity: 0; max-height: 0; margin-bottom: 0; }
      40% { transform: translateY(20px); opacity: 0; max-height: 76px; margin-bottom: 8px; }
      100% { transform: translateY(0); opacity: 1; max-height: 76px; margin-bottom: 8px; }
    }
    @keyframes toastIn { 0%{transform:translateY(-8px);opacity:0} 12%,88%{transform:translateY(0);opacity:1} 100%{transform:translateY(-8px);opacity:0} }
    @keyframes dripFall { 0%{transform:translateY(0) scale(1);opacity:0} 10%{opacity:1} 80%{transform:translateY(60px) scale(.85);opacity:1} 100%{transform:translateY(70px) scale(.6);opacity:0} }
    @keyframes pulseDot { 0%,100%{opacity:.6} 50%{opacity:1} }

    .drip { animation: dripFall 1.8s ease-in infinite; }

    /* FAQ accordion */
    details[open] summary .faq-plus { transform: rotate(45deg); }
    .faq-plus { transition: transform .25s ease-out; }
    details summary::-webkit-details-marker { display: none; }

    /* Marquee */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-track { animation: marquee 36s linear infinite; }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      { "@type": "Question", "name": "Is StopTap.in safe?",
        "acceptedAnswer": { "@type": "Answer", "text": "Yes. We never ask for your UPI PIN to view mandates. We operate on top of the public UPI mandate management infrastructure that every UPI user can already access." } },
      { "@type": "Question", "name": "Do I need to give my UPI PIN?",
        "acceptedAnswer": { "@type": "Answer", "text": "No. Viewing your mandates does not require your UPI PIN. Cancellation may require a UPI PIN entry inside your own UPI app, depending on your bank — never on StopTap." } },
      { "@type": "Question", "name": "Which UPI apps and banks does this work with?",
        "acceptedAnswer": { "@type": "Answer", "text": "It works at the UPI network layer, so mandates from GPay, PhonePe, Paytm, BHIM, and 100+ Indian banks are all visible in one list." } },
      { "@type": "Question", "name": "How long does cancellation take to reflect?",
        "acceptedAnswer": { "@type": "Answer", "text": "Most cancellations reflect within 24–72 hours, depending on the bank and biller." } },
      { "@type": "Question", "name": "Is StopTap.in affiliated with NPCI or the Indian government?",
        "acceptedAnswer": { "@type": "Answer", "text": "No. StopTap.in is an independent product. We are not NPCI, the RBI, or the Government of India." } },
      { "@type": "Question", "name": "How do you make money?",
        "acceptedAnswer": { "@type": "Answer", "text": "Right now, we don't. We may introduce optional paid features later (like alerts before a new mandate is set up). Cancelling subscriptions will always be free." } }
    ]
  }
  </script>
